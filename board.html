<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hodge Memorial — Clubhouse Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow+Condensed:wght@500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  /* ---------------------------------------------------------------
     HODGE MEMORIAL — clubhouse board
     Designed to be read from across a room. Everything scales in vmin
     so it fills a 55" TV or a laptop without touching a breakpoint.
     --------------------------------------------------------------- */

  :root{
    --board:    #0A1411;   /* deep pine, almost black — a dim room at 10pm */
    --board-2:  #10201A;
    --rule:     #1E3A30;
    --bone:     #EDE7D8;   /* old scoreboard paint */
    --dim:      #6B8078;
    --live:     #4ADE80;

    /* The board's own color. Hodge brass, lifted for a dark background —
       the same brass as the crest on every other page. Team colors belong
       to teams; the furniture belongs to the tournament. */
    --accent:   #E3B94F;
    --accent-t: rgba(227,185,79,.13);   /* the same, as a wash */

    /* MICHIGAN — Detroit pro, in one rope.
       Honolulu Blue leads. Tigers Orange is gorgeous but reads as red from
       across a room, and USA is already red. It rides in the middle instead. */
    --mi:       #0076B6;   /* Honolulu Blue — Lions */
    --mi-2:     #FA4616;   /* Orange — Tigers */
    --mi-3:     #1D42BA;   /* Royal — Pistons */
    --mi-ink:   #37A7E6;   /* Honolulu, lifted, for type at distance */

    /* USA — Old Glory, actual flag values. */
    --us:       #B22234;   /* Old Glory Red */
    --us-2:     #FFFFFF;   /* White */
    --us-3:     #3C3B6E;   /* Old Glory Blue */
    --us-ink:   #DB3149;   /* flag red is muddy as type on near-black */
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  body{
    background:var(--board);
    color:var(--bone);
    font-family:'IBM Plex Mono', ui-monospace, monospace;
    height:100vh;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    /* faint vignette so the center reads brighter from a distance */
    background-image:radial-gradient(ellipse at 50% 35%, #14261F 0%, var(--board) 70%);
  }

  /* ---------- header ---------- */
  header{
    display:flex; align-items:baseline; justify-content:space-between;
    padding:1.6vmin 2.4vmin;
    border-bottom:2px solid var(--rule);
    flex:0 0 auto;
  }
  .wordmark{
    font-family:'Anton', Impact, sans-serif;
    font-size:3.1vmin; letter-spacing:.06em; text-transform:uppercase;
    line-height:1;
  }
  .wordmark span{ color:var(--dim); }
  .venue{
    font-family:'Barlow Condensed', sans-serif;
    font-size:1.9vmin; letter-spacing:.22em; text-transform:uppercase;
    color:var(--dim); font-weight:600;
  }
  .status{ display:flex; align-items:center; gap:1.8vmin; }
  /* Useful on a phone or laptop. On the TV it's just quiet chrome — the
     link that actually matters up there is the one printed in the ticker. */
  .nav{ display:flex; gap:1.4vmin; margin-right:.6vmin; }
  .nav a{
    font-family:'Barlow Condensed', sans-serif;
    font-size:1.6vmin; font-weight:700; letter-spacing:.16em; text-transform:uppercase;
    color:var(--dim); text-decoration:none;
    padding:.5vmin 1vmin; border:1px solid var(--rule); border-radius:.4vmin;
    transition:.15s;
  }
  .nav a:hover{ color:var(--accent); border-color:var(--accent); }
  .dot{
    width:1.1vmin; height:1.1vmin; border-radius:50%;
    background:var(--live);
    box-shadow:0 0 0 0 rgba(74,222,128,.6);
    animation:pulse 2.4s infinite;
  }
  .dot.cold{ background:var(--dim); animation:none; }
  @keyframes pulse{
    0%{ box-shadow:0 0 0 0 rgba(74,222,128,.5); }
    70%{ box-shadow:0 0 0 1.6vmin rgba(74,222,128,0); }
    100%{ box-shadow:0 0 0 0 rgba(74,222,128,0); }
  }
  .stamp{
    font-family:'Barlow Condensed', sans-serif;
    font-size:1.7vmin; letter-spacing:.16em; text-transform:uppercase; color:var(--dim);
  }

  /* ---------- THE SIGNATURE: the cup ----------
     A Ryder Cup is a tug of war, so the hero is a rope, not a table.
     Whoever's past the center line has the cup in hand. */
  .cup{ flex:0 0 auto; padding:2.4vmin 2.4vmin 1.8vmin; }
  .cupRow{ display:flex; align-items:center; justify-content:space-between; }
  .team{ display:flex; align-items:baseline; gap:1.4vmin; }
  .team.right{ flex-direction:row-reverse; }
  .teamName{
    font-family:'Anton', Impact, sans-serif;
    font-size:4.2vmin; letter-spacing:.03em; text-transform:uppercase; line-height:1;
    padding-bottom:.9vmin; position:relative;
  }
  /* the team's full palette, as a rule under its name */
  .teamName::after{
    content:''; position:absolute; left:0; right:0; bottom:0; height:.5vmin;
  }
  .mi .teamName::after{
    background:linear-gradient(90deg, var(--mi) 0 34%, var(--mi-2) 34% 67%, var(--mi-3) 67% 100%);
  }
  .us .teamName::after{
    background:linear-gradient(90deg, var(--us) 0 34%, var(--us-2) 34% 67%, var(--us-3) 67% 100%);
  }
  .teamScore{
    font-family:'Anton', Impact, sans-serif;
    font-size:8.4vmin; line-height:.85; font-variant-numeric:tabular-nums;
  }
  .mi .teamName, .mi .teamScore{ color:var(--mi-ink); }
  .us .teamName, .us .teamScore{ color:var(--us-ink); }

  .cupState{
    text-align:center;
    font-family:'Barlow Condensed', sans-serif;
    font-size:2.2vmin; font-weight:700; letter-spacing:.24em; text-transform:uppercase;
    color:var(--bone);
  }
  .cupState small{ display:block; font-size:1.5vmin; letter-spacing:.18em; color:var(--dim); margin-top:.4vmin; font-weight:600; }

  .rope{
    position:relative; margin-top:1.8vmin;
    height:2.2vmin; background:var(--board-2);
    border:2px solid var(--rule); border-radius:1.1vmin; overflow:hidden;
  }
  /* Michigan pulls from the left. Pistons royal at the back, Honolulu at the
     the leading edge is the color you're meant to read at a glance. */
  .rope .fill{
    position:absolute; inset:0 auto 0 0;
    background:linear-gradient(90deg,
      var(--mi-3) 0%, var(--mi-3) 20%,
      var(--mi-2) 50%,
      var(--mi)   84%, var(--mi) 100%);
    transition:width .9s cubic-bezier(.2,.7,.2,1);
  }
  /* USA pulls from the right. Same idea, mirrored: blue at the back, red at the front. */
  .rope .fill.us{
    inset:0 0 0 auto;
    background:linear-gradient(270deg,
      var(--us-3) 0%, var(--us-3) 18%,
      var(--us-2) 46%,
      var(--us)   82%, var(--us) 100%);
  }
  /* the line you have to cross to take it */
  .rope .center{
    position:absolute; left:50%; top:-.7vmin; bottom:-.7vmin;
    width:2px; background:var(--bone); transform:translateX(-1px);
    box-shadow:0 0 0 1px rgba(10,20,17,.85);
  }

  .ropeKey{
    display:flex; justify-content:space-between; margin-top:.9vmin;
    font-family:'Barlow Condensed', sans-serif;
    font-size:1.6vmin; letter-spacing:.14em; text-transform:uppercase; color:var(--dim);
  }
  .ropeKey b{ color:var(--bone); font-weight:700; }

  /* ---------- rotating board ---------- */
  main{ flex:1 1 auto; padding:0 2.4vmin 1.2vmin; min-height:0; display:flex; flex-direction:column; }

  .boardHead{
    display:flex; align-items:center; gap:1.6vmin;
    padding:1.2vmin 0 .9vmin;
  }
  .boardName{
    font-family:'Anton', Impact, sans-serif;
    font-size:2.8vmin; text-transform:uppercase; letter-spacing:.05em;
  }
  .pips{ display:flex; gap:.7vmin; margin-left:auto; }
  .pip{ width:3.4vmin; height:.5vmin; background:var(--rule); border-radius:1px; }
  .pip.on{ background:var(--bone); }

  .grid{
    flex:1 1 auto; min-height:0;
    display:grid; grid-template-columns:1fr 1fr; gap:0 3.2vmin;
    align-content:start;
    animation:fade .5s ease;
  }
  @keyframes fade{ from{ opacity:0; transform:translateY(.8vmin);} to{ opacity:1; transform:none;} }

  .col{ display:flex; flex-direction:column; }

  .hrow, .prow{
    display:grid;
    grid-template-columns: 3.6vmin 1fr repeat(4, 3.6vmin) 5vmin;
    gap:.8vmin; align-items:center;
    padding:.62vmin .8vmin;
  }
  .hrow{
    font-family:'Barlow Condensed', sans-serif;
    font-size:1.6vmin; font-weight:700; letter-spacing:.18em; text-transform:uppercase;
    color:var(--dim); border-bottom:2px solid var(--rule);
  }
  .prow{
    font-size:1.95vmin;
    border-bottom:1px solid rgba(30,58,48,.5);
  }
  .prow:nth-child(even){ background:rgba(255,255,255,.018); }
  /* top three get the paint */
  .prow.p1{ background:var(--accent-t); }
  .prow.p1 .nm{ color:var(--accent); font-weight:600; }
  .prow.p2, .prow.p3{ background:rgba(255,255,255,.05); }

  .rk{ color:var(--dim); font-size:1.7vmin; text-align:right; font-variant-numeric:tabular-nums; }
  .prow.p1 .rk{ color:var(--accent); }
  .nm{ white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .rd{ text-align:center; color:var(--dim); font-size:1.65vmin; font-variant-numeric:tabular-nums; }
  .tot{ text-align:right; font-weight:600; font-variant-numeric:tabular-nums; }

  /* ---------- the Cup ---------- */
  .cuprow{
    grid-template-columns: 3.6vmin 1fr 4vmin 4vmin 4vmin 4vmin 5.4vmin !important;
  }
  /* Beat nobody, get nothing. Struck through, still visible — the point is
     that everyone can see the score you posted and the fact it didn't count. */
  .prow.gated{ opacity:.4; }
  .prow.gated .nm{ text-decoration:line-through; text-decoration-thickness:1px; }
  .prow.gated .rk{ color:var(--us-ink); }

  /* ---------- trophy case ---------- */
  .trophy{
    border:2px solid var(--rule); border-radius:.8vmin;
    background:linear-gradient(180deg, rgba(227,185,79,.06), transparent 55%);
    padding:2.4vmin 2.6vmin; display:flex; flex-direction:column;
  }
  .tName{
    font-family:'Anton', Impact, sans-serif;
    font-size:4.6vmin; text-transform:uppercase; letter-spacing:.03em;
    color:var(--accent); line-height:1;
  }
  .tBlurb{
    font-family:'Barlow Condensed', sans-serif;
    font-size:1.7vmin; font-weight:700; letter-spacing:.24em; text-transform:uppercase;
    color:var(--dim); margin-top:.8vmin;
  }
  .chase{
    display:flex; align-items:baseline; gap:1.4vmin;
    margin:2vmin 0; padding:1.4vmin 1.6vmin;
    background:rgba(255,255,255,.05); border-left:3px solid var(--accent); border-radius:.4vmin;
  }
  .chaseLabel{
    font-family:'Barlow Condensed', sans-serif;
    font-size:1.5vmin; font-weight:700; letter-spacing:.2em; text-transform:uppercase; color:var(--dim);
  }
  .chaseWho{ font-size:2.4vmin; font-weight:600; flex:1; }
  .chaseScore{
    font-family:'Anton', Impact, sans-serif;
    font-size:3vmin; color:var(--accent); font-variant-numeric:tabular-nums;
  }
  .chaseNote{
    font-family:'Barlow Condensed', sans-serif;
    font-size:1.5vmin; letter-spacing:.14em; text-transform:uppercase;
    color:var(--dim); margin:-1.2vmin 0 1.6vmin .4vmin;
  }
  .roll{ margin-top:auto; border-top:1px solid var(--rule); padding-top:1.2vmin; }
  .won{
    display:flex; gap:1.6vmin; align-items:baseline;
    padding:.75vmin 0; border-bottom:1px solid rgba(30,58,48,.4);
  }
  .won:last-child{ border-bottom:none; }
  .won .yr{
    font-family:'Barlow Condensed', sans-serif; font-weight:700;
    font-size:1.9vmin; letter-spacing:.1em; color:var(--dim); width:5vmin;
  }
  .won .nm{ font-size:2.1vmin; }
  .won:first-child .nm{ color:var(--accent); font-weight:600; }

  /* ---------- ticker ---------- */
  footer{
    flex:0 0 auto;
    border-top:2px solid var(--rule);
    background:var(--board-2);
    display:flex; align-items:center; gap:2vmin;
    padding:1.1vmin 2.4vmin;
    overflow:hidden;
  }
  .tickerLabel{
    font-family:'Barlow Condensed', sans-serif;
    font-size:1.6vmin; font-weight:700; letter-spacing:.2em; text-transform:uppercase;
    color:var(--board); background:var(--accent);
    padding:.4vmin 1vmin; border-radius:2px; white-space:nowrap;
  }
  .tickerUrl{
    font-family:'Barlow Condensed', sans-serif;
    font-size:1.75vmin; font-weight:700; letter-spacing:.1em;
    color:var(--bone); white-space:nowrap;
    padding-right:1.6vmin; border-right:1px solid var(--rule);
  }
  .tickerUrl b{ color:var(--accent); font-weight:700; }
  .tickerTrack{ flex:1; overflow:hidden; white-space:nowrap; }
  .tickerTrack .run{ display:inline-block; padding-left:100%; animation:slide 42s linear infinite; }
  .tickerTrack .run em{ color:var(--dim); font-style:normal; padding:0 1.6vmin; }
  @keyframes slide{ from{ transform:translateX(0);} to{ transform:translateX(-100%);} }
  .tickerTrack span{ font-size:1.85vmin; }

  .empty{ color:var(--dim); text-align:center; padding:6vmin; font-size:2.2vmin; }

  @media (prefers-reduced-motion: reduce){
    *, *::before, *::after{ animation:none !important; transition:none !important; }
    .tickerTrack .run{ padding-left:0; }
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="wordmark">Hodge Memorial <span id="yr"></span></div>
    <div class="venue" id="venue">Shanty Creek — Northern Michigan</div>
  </div>
  <div class="status">
    <nav class="nav">
      <a href="./talk.html">Trash Talk</a>
      <a href="./cup.html">Cup Scoring</a>
      <a href="./index.html">Recommend</a>
    </nav>
    <span class="dot" id="dot"></span>
    <span class="stamp" id="stamp">connecting</span>
  </div>
</header>

<section class="cup" id="cup" hidden>
  <div class="cupRow">
    <div class="team mi" id="teamA">
      <div class="teamScore" id="scoreA">—</div>
      <div class="teamName" id="nameA">—</div>
    </div>
    <div class="cupState">
      <div id="cupVerdict">—</div>
      <small id="cupSub"></small>
    </div>
    <div class="team right us" id="teamB">
      <div class="teamScore" id="scoreB">—</div>
      <div class="teamName" id="nameB">—</div>
    </div>
  </div>
  <div class="rope">
    <div class="fill" id="fillA"></div>
    <div class="fill us" id="fillB"></div>
    <div class="center"></div>
  </div>
  <div class="ropeKey" id="ropeKey"></div>
</section>

<main>
  <div class="boardHead">
    <div class="boardName" id="boardName">Loading</div>
    <div class="pips" id="pips"></div>
  </div>
  <div class="grid" id="grid"></div>
</main>

<footer>
  <span class="tickerLabel">Trash Talk</span>
  <span class="tickerUrl" id="tickerUrl"></span>
  <div class="tickerTrack">
    <div class="run" id="ticker"></div>
  </div>
</footer>

<script>
/* =================================================================
   CONFIG
   ================================================================= */
const CONFIG = {
  // Paste your Apps Script /exec URL here. Leave empty to run on demo data.
  API_URL: '',

  ROTATE_MS:  14000,   // how long each board holds on screen
  REFRESH_MS: 60000,   // how often we re-pull from the Sheet

  // The Ryder Cup board is the hero; these rotate below it.
  // 'Honors' and 'Cup' aren't Squabbit boards — we build those.
  ROTATING: ['Cup', 'Skins', 'Strokeplay', 'Honors'],



  // Who currently holds the cup. On a tie, the holder retains — so the
  // challenger has to actually take it off them. Update after each year.
  CUP_HOLDER: 'Michigan',

  // Points on the table. 2025: three team rounds of 7, plus 14 singles.
  // Holder retains at half (17.5). Challenger must clear it (18).
  TOTAL_POINTS: 35,

  // Rounds to drop from World's #1 (1-indexed), e.g. [3].
  // null = detect it from the scores. 2025's R3 was the 2-man scramble.
  SCRAMBLE_ROUNDS: null,
};

/* =================================================================
   THE TROPHY CASE
   Add the new name each September. Newest first.
   ================================================================= */
const AWARDS = [
  {
    name: "World's #1",
    blurb: 'Low gross · scramble excluded',
    winners: [
      { year: 2025, who: 'Will Crane' },
      { year: 2024, who: 'Will Crane' },
      { year: 2023, who: 'Kellen VanDreumel' },
    ],
    race: p => lowGross(p),
  },
  {
    name: 'The Max',
    blurb: 'Low net',
    winners: [
      { year: 2025, who: 'Michael Cadieux' },
      { year: 2024, who: 'Ande Scherf' },
    ],
    race: p => leaderOf(p, 'Strokeplay'),
  },
];

/* Trash talk now comes down inside the payload, posted from talk.html. */

/* Demo payload — the real 2025 board, so this thing renders before it's wired. */
const DEMO = {
  tournament: 'Hodge Memorial 2025', live: true, fetchedAt: new Date().toISOString(),
  talk: [
    { name:'Tom Monaweck', message:'Cadieux played the Summit like he owed it money.' },
    { name:'Ande Scherf',  message:'Max Smith opens +38 at Hawk\'s Eye and still wins 10 skins. Explain that.' },
    { name:'Will Crane',   message:'Jon Collins has now three-putted on four separate golf courses.' },
  ],
  boards: [
    { name:'Ryder Cup', headers:['#','Name','R1','R2','R3','R4','Tot'], rows:[
      ['T1','Michigan','4','5','3','5.5','17.5'],
      ['T1','USA','3','2','4','8.5','17.5'],
    ]},
    { name:'Skins', headers:['#','Name','R1','R2','R3','R4','Tot'], rows:[
      ['1','Jason Bergman','0','0','11','2','13'],['2','Joe Suchecki','6','1','0','3','10'],
      ['3','Max Smith','0','0','8','2','10'],['4','Kellen VanDreumel','3','5','0','1','9'],
      ['5','Michael Cadieux','3','3','0','0','6'],['6','Drew Brackett','0','0','0','5','5'],
      ['T7','Chris McGee','0','4','0','0','4'],['T7','Tom Monaweck','0','4','0','0','4'],
      ['9','Pat Brackett','0','0','0','3','3'],['10','Jeff Simmons','0','0','0','2','2'],
      ['11','Luke Westerhouse','2','0','0','0','2'],['T12','Brad Desnoyers','1','0','0','0','1'],
      ['T12','Jon Collins','0','0','1','0','1'],['T12','Rob Crane','1','0','0','0','1'],
      ['T15','Adam Morocco','0','0','0','0','0'],['T15','Josh Herder','0','0','0','0','0'],
      ['T15','Will Crane','0','0','0','0','0'],['T15','Gary Aschcraft','0','0','0','0','0'],
      ['T15','Ross Desnoyers','0','0','0','0','0'],['T15','Ande Scherf','0','0','0','0','0'],
      ['T15','Jesse Frifeldt','0','0','0','0','0'],['T15','Blake Vipond','0','0','0','0','0'],
      ['T15','Jim Brackett','0','0','0','0','0'],['T15','Dan Abbott','0','0','0','0','0'],
      ['T15','Jeff Hauter','0','0','0','0','0'],['T15','Ross Gray','0','0','0','0','0'],
      ['T15','Davis McFarlane','0','0','0','0','0'],['T15','Blake Desmarteau','0','0','0','0','0'],
    ]},
    { name:'Strokeplay', headers:['#','Name','R1','R2','R3','R4','Tot'], rows:[
      ['1','Michael Cadieux','-8','+1','-26','+4','-29'],['2','Tom Monaweck','+8','-4','-19','-3','-18'],
      ['3','Jason Bergman','+1','+1','-23','+3','-18'],['4','Davis McFarlane','-4','-1','-9','+2','-12'],
      ['5','Josh Herder','-1','-1','-17','+10','-9'],['6','Joe Suchecki','E','-3','-4','+2','-5'],
      ['7','Pat Brackett','+6','-1','-15','+6','-4'],['8','Drew Brackett','-2','+8','-14','+5','-3'],
      ['9','Adam Morocco','+8','+8','-17','-1','-2'],['10','Kellen VanDreumel','E','E','-4','+3','-1'],
      ['11','Ross Gray','-2','+1','+2','+1','+2'],['12','Will Crane','E','-1','-2','+5','+2'],
      ['13','Ross Desnoyers','+1','+6','-12','+8','+3'],['14','Dan Abbott','+6','+7','-11','+1','+3'],
      ['15','Ande Scherf','+11','+2','-11','+2','+4'],['16','Jesse Frifeldt','+7','+8','-8','E','+7'],
      ['17','Blake Desmarteau','+2','+12','-18','+11','+7'],['18','Brad Desnoyers','+10','+12','-21','+8','+9'],
      ['19','Jeff Simmons','+2','+8','-5','+5','+10'],['20','Jon Collins','+17','+11','-27','+12','+13'],
      ['21','Jim Brackett','+8','+16','-22','+11','+13'],['22','Jeff Hauter','+9','+9','-13','+9','+14'],
      ['23','Gary Aschcraft','+2','+11','-14','+16','+15'],['24','Luke Westerhouse','+6','+13','-7','+7','+19'],
      ['25','Blake Vipond','+11','+8','E','+2','+21'],['26','Rob Crane','+13','+10','-11','+10','+22'],
      ['27','Chris McGee','+7','+23','-16','+9','+23'],['28','Max Smith','+23','+11','-14','+3','+23'],
    ]},
  ]
};

/* =================================================================
   STATE
   ================================================================= */
let payload = null;
let boardIdx = 0;

/* =================================================================
   DATA
   ================================================================= */
async function load(){
  if (!CONFIG.API_URL){
    payload = DEMO;
    render();
    setStamp('demo data — 2025', false);
    return;
  }
  try{
    const res = await fetch(CONFIG.API_URL, { cache:'no-store' });
    payload = await res.json();
    render();
    setStamp(payload.live ? 'live' : 'not started', payload.live);
  }catch(err){
    setStamp('reconnecting', false);   // keep the last good board on screen
  }
}

function setStamp(text, live){
  const stamp = document.getElementById('stamp');
  const when  = payload && payload.fetchedAt ? ' · ' + ago(payload.fetchedAt) : '';
  stamp.textContent = text + when;
  document.getElementById('dot').classList.toggle('cold', !live);
}

function ago(iso){
  const mins = Math.round((Date.now() - new Date(iso)) / 60000);
  if (mins < 1)  return 'just now';
  if (mins < 60) return mins + 'm ago';
  return Math.round(mins/60) + 'h ago';
}

const boardBy = name => (payload.boards || []).find(b => b.name === name);

/* ---- award race math ----
   Player rows on the Ryder Cup board (the ones with '-' for rank) carry gross
   to par per round. The two team rows carry the actual cup score. */
function grossRows(p){
  const rc = (p.boards || []).find(b => b.name === 'Ryder Cup');
  return rc ? rc.rows.filter(r => r[0] === '-') : [];
}

/* '+12' -> 12, '-4' -> -4, 'E' -> 0, '' -> null */
function toNum(s){
  const t = String(s || '').trim();
  if (!t || t === '-') return null;
  if (t.toUpperCase() === 'E') return 0;
  const n = parseFloat(t.replace('+',''));
  return isNaN(n) ? null : n;
}

/* ---- scramble detection ----
   In a 2-man scramble both partners post the same gross. So a scramble round
   is the one where every score in the field appears an EVEN number of times —
   14 perfect pairs across 28 men. Stroke play rounds never do this; somebody
   always has a number nobody else has.

   2025's R3 pairs perfectly. R1, R2 and R4 don't. So the format tells us which
   round it was, and nobody has to remember in 2031.

   Set CONFIG.SCRAMBLE_ROUNDS = [3] to override (1-indexed). null = auto. */
function scrambleRounds(rows){
  if (CONFIG.SCRAMBLE_ROUNDS) return CONFIG.SCRAMBLE_ROUNDS.map(n => n - 1);
  if (rows.length < 4 || rows.length % 2 !== 0) return [];   // can't pair an odd field

  const found = [];
  for (let col = 0; col < 4; col++){
    const vals = rows.map(r => toNum(r[col + 2]));
    if (vals.some(v => v === null)) continue;                // round not played yet

    const tally = {};
    vals.forEach(v => tally[v] = (tally[v] || 0) + 1);

    const allPaired = Object.keys(tally).every(k => tally[k] % 2 === 0);
    const enoughDupes = Object.keys(tally).length <= vals.length / 2;

    if (allPaired && enoughDupes) found.push(col);
  }
  return found;
}

/* Sum a player's rounds, skipping any scramble. */
function sumScores(r, skip){
  const vals = [];
  for (let col = 0; col < 4; col++){
    if (skip && skip.indexOf(col) !== -1) continue;
    const v = toNum(r[col + 2]);
    if (v !== null) vals.push(v);
  }
  return vals.length ? vals.reduce((a,b) => a+b, 0) : null;
}

function lowGross(p){
  const rows = grossRows(p);
  if (!rows.length) return null;

  const skip = scrambleRounds(rows);

  let best = null;
  rows.forEach(r => {
    const v = sumScores(r, skip);
    if (v === null) return;
    if (!best || v < best.value) best = { who: r[1], value: v };
  });
  if (!best) return null;

  return {
    who: best.who,
    score: fmtScore(best.value),
    note: skip.length ? 'R' + skip.map(c => c + 1).join('/R') + ' scramble — not counted' : ''
  };
}

/* Whoever's sitting on top of a board right now. */
function leaderOf(p, boardName){
  const b = (p.boards || []).find(x => x.name === boardName);
  if (!b || !b.rows.length) return null;
  const r = b.rows[0];
  return { who: r[1], score: r[r.length - 1], note: '' };
}

const fmtScore = n => n === 0 ? 'E' : (n > 0 ? '+' + n : String(n));

/* =================================================================
   RENDER
   ================================================================= */
function render(){
  const year = (payload.tournament.match(/\b(20\d\d)\b/) || [])[1] || '';
  document.getElementById('yr').textContent = year;

  renderCup();
  renderTickerUrl();
  renderTicker();
  renderBoard();
}

/* The hero. Team rows are the ones with a real rank; players carry '-'.

   The rope isn't a share-of-points bar — it's a race to a line. The holder
   retains on a tie, so the two sides are chasing different numbers: half the
   points retains it, half-plus-a-half takes it. That gap is the whole drama
   and it belongs on the wall. */
function renderCup(){
  const rc = boardBy('Ryder Cup');
  const cup = document.getElementById('cup');
  if (!rc){ cup.hidden = true; return; }

  const teams = rc.rows.filter(r => r[0] && r[0] !== '-').slice(0,2);
  if (teams.length < 2){ cup.hidden = true; return; }
  cup.hidden = false;

  const [a, b] = teams;
  const nameA = a[1], nameB = b[1];
  const totA = parseFloat(a[a.length-1]) || 0;
  const totB = parseFloat(b[b.length-1]) || 0;

  document.getElementById('nameA').textContent  = nameA;
  document.getElementById('nameB').textContent  = nameB;
  document.getElementById('scoreA').textContent = fmtPts(totA);
  document.getElementById('scoreB').textContent = fmtPts(totB);

  const TOTAL  = CONFIG.TOTAL_POINTS;
  const RETAIN = TOTAL / 2;            // holder needs this
  const WIN    = RETAIN + 0.5;         // challenger needs this
  const holder = CONFIG.CUP_HOLDER;

  // The rope: progress toward the line, not share of what's been won.
  document.getElementById('fillA').style.width = Math.min(100, (totA / TOTAL) * 100) + '%';
  document.getElementById('fillB').style.width = Math.min(100, (totB / TOTAL) * 100) + '%';

  const verdict = document.getElementById('cupVerdict');
  const sub     = document.getElementById('cupSub');

  // The line means different things to the two sides. Say so, out loud.
  document.getElementById('ropeKey').innerHTML =
    '<span>' + esc(holder) + ' holds it — <b>' + fmtPts(RETAIN) + '</b> retains</span>' +
    '<span>Challenger needs <b>' + fmtPts(WIN) + '</b> to take it</span>';

  const need = (team, tot) => (team === holder ? RETAIN : WIN) - tot;
  const needA = need(nameA, totA), needB = need(nameB, totB);

  // Decided?
  if (needA <= 0){
    verdict.textContent = nameA + (nameA === holder && totA < WIN ? ' retains' : ' wins');
    sub.textContent = fmtPts(totA) + ' – ' + fmtPts(totB);
  } else if (needB <= 0){
    verdict.textContent = nameB + (nameB === holder && totB < WIN ? ' retains' : ' wins');
    sub.textContent = fmtPts(totB) + ' – ' + fmtPts(totA);
  } else {
    // Still live. Say what each side has left to do — that's the actual story.
    const played = totA + totB;
    if (totA === totB){
      verdict.textContent = 'All Square';
    } else {
      const front = totA > totB ? nameA : nameB;
      verdict.textContent = front + ' by ' + fmtPts(Math.abs(totA - totB));
    }
    sub.textContent =
      nameA + ' needs ' + fmtPts(needA) + '  ·  ' +
      nameB + ' needs ' + fmtPts(needB) + '  ·  ' +
      fmtPts(TOTAL - played) + ' left';
  }
}

const fmtPts = n => (n % 1 === 0 ? String(n) : n.toFixed(1));

/* Print the address so a man on the couch can type it into his phone.
   Derived from wherever this page is actually served, so it can't go stale. */
function renderTickerUrl(){
  const el = document.getElementById('tickerUrl');
  const u = new URL('./talk.html', location.href);
  const shown = (u.host + u.pathname)
    .replace(/^www\./, '')
    .replace(/\.html$/, '');
  el.innerHTML = 'Post at <b>' + esc(shown) + '</b>';
}

function renderTicker(){
  const t = document.getElementById('ticker');
  const talk = payload.talk || [];

  if (!talk.length){
    t.innerHTML = '<span style="color:var(--dim)">Nobody has said anything yet. Cowards.</span>';
    return;
  }

  const line = talk.map(p =>
    '<span>' + esc(p.message) + '<em>&mdash; ' + esc(p.name) + '</em></span>'
  ).join('<em>&bull;</em>');

  t.innerHTML = line + '<em>&bull;</em>' + line;   // doubled so the loop is seamless
}

function renderBoard(){
  const has = n =>
    n === 'Honors' ? true :
    n === 'Cup'    ? !!(payload.cup && payload.cup.cup && payload.cup.cup.length) :
    !!boardBy(n);

  const names = CONFIG.ROTATING.filter(has);
  const grid  = document.getElementById('grid');
  const pips  = document.getElementById('pips');

  if (names.length){
    const current = names[boardIdx % names.length];
    pips.innerHTML = names.map((_, i) =>
      '<div class="pip' + (i === boardIdx % names.length ? ' on' : '') + '"></div>').join('');

    if (current === 'Honors'){ renderHonors(grid); return; }
    if (current === 'Cup'){ renderCup_(grid); return; }
  }

  if (!names.length){
    document.getElementById('boardName').textContent = payload.live ? 'No boards' : 'Not started';
    grid.innerHTML = '<div class="empty" style="grid-column:1/-1">' +
      (payload.live ? 'Squabbit is up but returned no boards.' : 'Scores post here once the first round is in the books.') +
      '</div>';
    pips.innerHTML = '';
    return;
  }

  const board = boardBy(names[boardIdx % names.length]);
  document.getElementById('boardName').textContent = board.name;

  pips.innerHTML = names.map((_, i) =>
    '<div class="pip' + (i === boardIdx % names.length ? ' on' : '') + '"></div>').join('');

  // 28 names don't fit down one side of a TV. Split them.
  const half = Math.ceil(board.rows.length / 2);
  const cols = [board.rows.slice(0, half), board.rows.slice(half)];

  grid.innerHTML = cols.map(rows =>
    '<div class="col">' + headRow(board.headers) + rows.map(playerRow).join('') + '</div>'
  ).join('');

  // restart the entrance animation
  grid.style.animation = 'none'; void grid.offsetWidth; grid.style.animation = '';
}

/* The trophy case. Past winners, and whoever's currently chasing them. */
function renderHonors(grid){
  document.getElementById('boardName').textContent = 'The Hardware';

  grid.innerHTML = AWARDS.map(a => {
    const race = payload.live ? a.race(payload) : null;

    const chase = race
      ? '<div class="chase">' +
          '<div class="chaseLabel">Currently</div>' +
          '<div class="chaseWho">' + esc(race.who) + '</div>' +
          '<div class="chaseScore">' + esc(race.score) + '</div>' +
        '</div>' +
        (race.note ? '<div class="chaseNote">' + esc(race.note) + '</div>' : '')
      : '<div class="chase"><div class="chaseLabel">Not started</div></div>';

    const roll = a.winners.map(w =>
      '<div class="won">' +
        '<span class="yr">' + w.year + '</span>' +
        '<span class="nm">' + esc(w.who) + '</span>' +
      '</div>').join('');

    return '<div class="trophy">' +
      '<div class="tName">' + esc(a.name) + '</div>' +
      '<div class="tBlurb">' + esc(a.blurb) + '</div>' +
      chase +
      '<div class="roll">' + roll + '</div>' +
    '</div>';
  }).join('');

  grid.style.animation = 'none'; void grid.offsetWidth; grid.style.animation = '';
}

/* The Hodge Cup. Match points do the heavy lifting; the gate does the moral work. */
function renderCup_(grid){
  document.getElementById('boardName').textContent = 'The Hodge Cup';

  const all = payload.cup.cup;
  const half = Math.ceil(Math.min(all.length, 20) / 2);
  const cols = [all.slice(0, half), all.slice(half, half * 2)];

  const head =
    '<div class="hrow cuprow">' +
      '<div style="text-align:right">#</div><div>Player</div>' +
      '<div style="text-align:center">Mtch</div>' +
      '<div style="text-align:center">Grs</div>' +
      '<div style="text-align:center">Net</div>' +
      '<div style="text-align:center">Skn</div>' +
      '<div style="text-align:right">Cup</div>' +
    '</div>';

  grid.innerHTML = cols.map(rows =>
    '<div class="col">' + head + rows.map(c => {
      const cls = !c.eligible ? ' gated' : (c.place === 1 ? ' p1' : c.place <= 3 ? ' p2' : '');
      return '<div class="prow cuprow' + cls + '">' +
        '<div class="rk">' + (c.eligible ? c.place : '✗') + '</div>' +
        '<div class="nm">' + esc(c.name) + '</div>' +
        '<div class="rd">' + c.mp + '</div>' +
        '<div class="rd">' + (c.grossRank ? '#' + c.grossRank : '–') + '</div>' +
        '<div class="rd">' + (c.netRank ? '#' + c.netRank : '–') + '</div>' +
        '<div class="rd">' + (c.skins || '–') + '</div>' +
        '<div class="tot">' + c.points.toFixed(1) + '</div>' +
      '</div>';
    }).join('') + '</div>'
  ).join('');

  grid.style.animation = 'none'; void grid.offsetWidth; grid.style.animation = '';
}

function headRow(h){
  return '<div class="hrow">' +
    '<div style="text-align:right">' + esc(h[0]) + '</div>' +
    '<div>' + esc(h[1]) + '</div>' +
    h.slice(2,6).map(x => '<div style="text-align:center">' + esc(x) + '</div>').join('') +
    '<div style="text-align:right">' + esc(h[6] || 'Tot') + '</div>' +
  '</div>';
}

function playerRow(r){
  const rank = (r[0] || '').replace('T','');
  const cls  = rank === '1' ? ' p1' : rank === '2' ? ' p2' : rank === '3' ? ' p3' : '';
  return '<div class="prow' + cls + '">' +
    '<div class="rk">' + esc(r[0]) + '</div>' +
    '<div class="nm">' + esc(r[1]) + '</div>' +
    r.slice(2,6).map(x => '<div class="rd">' + esc(x) + '</div>').join('') +
    '<div class="tot">' + esc(r[6] || '') + '</div>' +
  '</div>';
}

const esc = s => String(s == null ? '' : s)
  .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

/* =================================================================
   LOOPS
   ================================================================= */
load();
setInterval(load, CONFIG.REFRESH_MS);
setInterval(() => { if (payload){ boardIdx++; renderBoard(); } }, CONFIG.ROTATE_MS);
</script>
